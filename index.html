<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kasir Pintar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        
        <main class="product-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
                <h2 style="margin: 0;">Daftar Menu</h2>
                <input type="text" id="cari-produk" placeholder="Cari nama produk..." class="input-kasir smooth-transition" style="flex-grow: 1; max-width: 300px;">
            </div>
            
            <p id="loading-text" class="smooth-transition">Memuat data produk...</p>
            
            <div id="product-grid" class="grid"></div>
        </main>

        <aside class="cart-section">
            <h2>Keranjang</h2>
            
            <div id="cart-items" class="cart-list">
                <p class="empty-cart-msg">Keranjang masih kosong</p>
            </div>
            
            <div class="cart-summary">
                <div class="input-group">
                    <label>Nama / No. Meja</label>
                    <input type="text" id="nama-pembeli" placeholder="Misal: Meja 4 / Budi" class="input-kasir smooth-transition">
                </div>
                <div class="input-group">
                    <label>Uang Bayar (Rp)</label>
                    <input type="number" id="uang-bayar" placeholder="0" class="input-kasir smooth-transition">
                </div>

                <div class="total-row">
                    <h3>Total Harga:</h3>
                    <h3 id="total-price">Rp 0</h3>
                </div>
                <div class="total-row">
                    <h3>Kembalian:</h3>
                    <h3 id="uang-kembali" style="color: #10b981;">Rp 0</h3>
                </div>

                <button id="btn-checkout" class="btn-primary">Lanjutkan Pembayaran</button>
            </div>
        </aside>

    </div>
<div id="struk-modal" class="modal smooth-transition">
        <div class="modal-content">
            <div id="struk-preview">
                </div>
            <div class="modal-actions">
                <button id="btn-print-thermal" class="btn-primary" style="margin-bottom: 8px;">🖨️ Cetak Thermal</button>
                <button id="btn-download-pdf" class="btn-secondary" style="margin-bottom: 8px;">📄 Download PDF / Print</button>
                <button id="btn-tutup-modal" class="btn-danger">Tutup</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
