<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Sistem Meriah</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="top-header">
        <div class="logo-area">
            <span style="color: #ef4444; font-size: 24px;">🧰</span> 
            <h2>TOKO BOS</h2>
        </div>
        <div class="header-info">
            <div><small>CUSTOMER</small><br><b>CASH / UMUM</b></div>
            <div><small>TANGGAL</small><br><b id="tanggal-hari-ini">-</b></div>
            <div><small>KASIR</small><br><b>Admin 1</b></div>
        </div>
    </header>

    <div class="pos-container">
        <main class="main-panel">
            <div class="input-total-row">
                <div class="input-section">
                    <label>+ TAMBAH ITEM</label>
                    <input type="text" id="cari-produk" class="smooth-transition" placeholder="Ketik nama atau kode item...">
                    <div id="search-dropdown" class="dropdown smooth-transition" style="display: none;"></div>
                </div>
                <div class="big-total-section">
                    <span style="color: #ef4444; font-weight: bold;">Total</span>
                    <h1 id="total-price-big">Rp. 0</h1>
                </div>
            </div>

            <div class="action-toolbar">
                <button>📄 NEW (F11)</button>
                <button>📂 OPEN</button>
                <button>🔢 QTY (F4)</button>
                <button>🗑️ HAPUS ITEM</button>
            </div>

            <div class="table-container">
                <table class="cart-table">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Kode Item</th>
                            <th>Nama Item</th>
                            <th>Qty</th>
                            <th>Harga</th>
                            <th>Subtotal</th>
                        </tr>
                    </thead>
                    <tbody id="cart-table-body">
                        <tr><td colspan="6" style="text-align: center; padding: 20px; color: #9ca3af;">Belum ada item ditambahkan</td></tr>
                    </tbody>
                </table>
            </div>
        </main>

        <aside class="sidebar-panel">
            <div class="sidebar-buttons">
                <button>⭐ FAVORIT</button>
                <button>💲 HARGA</button>
                <button>🏷️ DISC ITEM</button>
                <button>👤 MEMBER</button>
                <button>🔍 CEK HARGA</button>
            </div>
            
            <div class="payment-summary">
                <div class="input-group">
                    <label>Nama / Meja:</label>
                    <input type="text" id="nama-pembeli" class="smooth-transition">
                </div>
                <div class="input-group">
                    <label>Uang Bayar:</label>
                    <input type="number" id="uang-bayar" class="smooth-transition">
                </div>
                <div style="display: flex; justify-content: space-between; margin-top: 10px; font-weight: bold;">
                    <span>KEMBALI:</span>
                    <span id="uang-kembali" style="color: #10b981;">Rp. 0</span>
                </div>
            </div>

            <button id="btn-checkout" class="btn-bayar smooth-transition">BAYAR (F12)</button>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
